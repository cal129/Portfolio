<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Callum Randall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Coiny&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            background: linear-gradient(135deg, #ebe4c7 0%, #f6f1df 100%);
            min-height: 100vh;
        }

        .contact-page {
            max-width: 900px;
            margin: 0 auto;
            padding: calc(var(--nav-height) + 2rem) 1rem 3rem;
            font-family: noto serif, serif;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .contact-title {
            font-family: coiny, sans-serif;
            letter-spacing: 0.02em;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border-color: rgba(0, 0, 0, 0.14);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6f8f9b;
            box-shadow: 0 0 0 0.2rem rgba(111, 143, 155, 0.2);
        }

        .contact-meta a {
            color: #1f1f1f;
            text-decoration: none;
        }

        .contact-meta a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg fixed-top px-4">
            <a class="navbar-brand fw-bold" href="index.html">CR_</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#portfolio">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="contact-page">
        <div class="contact-card p-4 p-md-5">
            <div class="row g-4 align-items-start">
                <div class="col-12 col-md-5">
                    <h1 class="contact-title mb-3">Contact Me</h1>
                    <p class="mb-4">Tell me what you are planning and I will get back to you as soon as possible.</p>
                    <div class="contact-meta d-grid gap-2">
                        <div><i class="bi bi-envelope me-2"></i><a href="mailto:hello@example.com">hello@example.com</a></div>
                        <div><i class="bi bi-telephone me-2"></i><a href="tel:+440000000000">+44 0000 000000</a></div>
                        <div><i class="bi bi-instagram me-2"></i><a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a></div>
                    </div>
                </div>
                <div class="col-12 col-md-7">
                    <form action="#" method="post" class="row g-3">
                        <div class="col-12">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-12">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-12">
                            <label for="service" class="form-label">Service</label>
                            <select class="form-select" id="service" name="service" required>
                                <option value="" selected disabled>Select a service</option>
                                <option value="web-design">Web Design</option>
                                <option value="photography">Photography</option>
                                <option value="videography">Videography</option>
                                <option value="graphic-design">Graphic Design</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn glass-btn">Send Message</button>
                            <a href="index.html" class="btn btn-outline-dark">Back to Home</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const navbar = document.querySelector('.navbar');
        const navbarCollapse = document.getElementById('navbarNav');

        const toggleNavbarBackground = () => {
            if (window.scrollY > 0) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        };

        window.addEventListener('scroll', toggleNavbarBackground);
        navbarCollapse.addEventListener('shown.bs.collapse', () => {
            navbar.classList.add('menu-open');
        });
        navbarCollapse.addEventListener('hidden.bs.collapse', () => {
            navbar.classList.remove('menu-open');
        });
        toggleNavbarBackground();
    </script>
</body>
</html>
